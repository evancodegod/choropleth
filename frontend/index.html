<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic document metadata for responsive map layout. -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canada Choropleth Frontend</title>
  <!-- Leaflet core styles (required for map tiles/controls). -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .app {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }

    .controls label {
      display: block;
      font-size: 12px;
      color: #445;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccd3da;
      border-radius: 8px;
    }

    #status {
      font-size: 14px;
      color: #516170;
    }

    #map {
      height: 78vh;
      min-height: 520px;
      border: 1px solid #d5dde5;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <!-- Filter controls populated dynamically from /api/filters. -->
    <section class="controls">
      <div>
        <label for="facility">Facility</label>
        <select id="facility"></select>
      </div>
      <div>
        <label for="condition">Condition</label>
        <select id="condition"></select>
      </div>
    </section>
    <!-- Runtime status message (loading/errors/current selection summary). -->
    <div id="status">Loading...</div>
    <!-- Leaflet map mount point; app.js creates the map in this container. -->
    <div id="map"></div>
  </main>
  <!-- Leaflet runtime library. -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <!-- Frontend app logic (API calls, choropleth rendering, interactions). -->
  <script type="module" src="./app.js"></script>
</body>
</html>
